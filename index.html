<!DOCTYPE html>

<head>

</head>

<body>

<header>

</header>

</section>

<!-- MENU -->
<section class="menu">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908177522-040f4a0f0a7b?auto=format&fit=crop&w=1200&q=80">
    <h2>Kebab Box</h2>
    <button onclick="add('Kebab Box',69,this)">Tilføj - 69 kr</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086?auto=format&fit=crop&w=1200&q=80">
    <h2>Durum</h2>
    <button onclick="add('Durum',69,this)">Tilføj - 69 kr</button>

    <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1200&q=80">

    <button onclick="add('German Kebab',79,this)">Tilføj - 79 kr</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=1200&q=80">
    <h2>Kebab Bowl</h2>
    <button onclick="add('Kebab Bowl',89,this)">Tilføj - 89 kr</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=1200&q=80">
    <h2>Pitabrød</h2>
    <button onclick="add('Pitabrød',45,this)">Tilføj - 45 kr</button>
  </div>

</section>

  <p>🏠 Ålekistevej 82, 2720 København</p>

  <p>Alle dage: 11:00 – 21:00</p>

  <div class="actions">
    <a class="btn" href="tel:+4531531624">📞 Ring nu</a>
    <a class="btn" target="_blank"
       href="https://www.google.com/maps?q=Ålekistevej+82+2720+København">
      🗺️ Find vej
    </a>
